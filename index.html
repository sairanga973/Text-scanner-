<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OCR Scanner</title>

<!-- OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<!-- Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- Cropper -->
<link 
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:14px;
    margin-top:20px;
}

input,textarea{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    box-sizing:border-box;
}

textarea{
    height:180px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    margin-top:10px;
    margin-right:10px;
}

button:hover{
    background:#1d4ed8;
}

img{
    max-width:100%;
    margin-top:15px;
    border-radius:12px;
}

.history-item{
    background:#334155;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
    word-break:break-word;
}

</style>

</head>

<body>

<div class="container">

<h1>OCR Scanner</h1>

<!-- LOGIN -->

<div class="card" id="loginSection">

<h2>Email Login</h2>

<input
type="email"
id="email"
placeholder="Enter Email">

<button onclick="login()">
Login
</button>

</div>

<!-- APP -->

<div id="appSection" style="display:none;">

<div class="card">

<h2>Select Image</h2>

<input
type="file"
accept="image/*"
capture="environment"
id="imageInput">

<img id="previewImage">

<br>

<button onclick="cropImage()">
Crop Image
</button>

<button onclick="scanText()">
Scan Text
</button>

<p id="status"></p>

<textarea
id="resultText"
placeholder="Scanned text appears here">
</textarea>

<button onclick="saveScan()">
Save Scan
</button>

<button onclick="exportExcel()">
Export Excel
</button>

</div>

<!-- HISTORY -->

<div class="card">

<h2>Scan History</h2>

<div id="history"></div>

</div>

</div>

</div>

<script>

let currentUser = "";

let cropper;

let croppedCanvas;

let scanHistory = JSON.parse(
    localStorage.getItem("scanHistory")
) || [];

const previewImage =
document.getElementById("previewImage");


// LOGIN

function login(){

    let email =
    document.getElementById("email").value;

    if(email.trim() === ""){

        alert("Enter Email");

        return;
    }

    currentUser = email;

    localStorage.setItem("ocrUser", email);

    document.getElementById("loginSection")
    .style.display = "none";

    document.getElementById("appSection")
    .style.display = "block";

    loadHistory();

}


// IMAGE SELECT

document.getElementById("imageInput")
.addEventListener("change", function(e){

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){

        previewImage.src = event.target.result;

        // DESTROY OLD CROPPER

        if(cropper){

            cropper.destroy();

        }

        // NEW CROPPER

        cropper = new Cropper(previewImage,{

            viewMode:1,
            autoCropArea:1

        });

    }

    reader.readAsDataURL(file);

});


// CROP IMAGE

function cropImage(){

    if(!cropper){

        alert("Select image first");

        return;
    }

    croppedCanvas =
    cropper.getCroppedCanvas({

        width:1500,
        height:1500

    });

    previewImage.src =
    croppedCanvas.toDataURL();

    cropper.destroy();

    document.getElementById("status").innerText =
    "Image Cropped";

}


// OCR SCAN

async function scanText(){

    if(!croppedCanvas){

        alert("Crop image first");

        return;
    }

    document.getElementById("status").innerText =
    "Scanning OCR...";

    const result =
    await Tesseract.recognize(

        croppedCanvas,

        'eng',

        {
            logger:m=>console.log(m)
        }

    );

    let cleanText =
    result.data.text.trim();

    document.getElementById("resultText").value =
    cleanText;

    document.getElementById("status").innerText =
    "OCR Scan Completed";

}


// SAVE HISTORY

function saveScan(){

    let text =
    document.getElementById("resultText").value;

    if(text.trim() === ""){

        alert("No text found");

        return;
    }

    let duplicate =
    scanHistory.find(

        item =>

        item.text.toLowerCase().trim()

        ===

        text.toLowerCase().trim()

    );

    if(duplicate){

        alert("Duplicate already exists");

        return;
    }

    let data = {

        user: currentUser,

        text: text,

        date: new Date().toLocaleString()

    };

    scanHistory.unshift(data);

    localStorage.setItem(

        "scanHistory",

        JSON.stringify(scanHistory)

    );

    loadHistory();

    alert("Saved Successfully");

}


// LOAD HISTORY

function loadHistory(){

    let historyDiv =
    document.getElementById("history");

    historyDiv.innerHTML = "";

    scanHistory.forEach((item,index)=>{

        let div =
        document.createElement("div");

        div.className = "history-item";

        div.innerHTML = `

        <b>User:</b> ${item.user}<br><br>

        <b>Date:</b> ${item.date}<br><br>

        <b>Text:</b><br><br>

        ${item.text}<br><br>

        <button onclick="deleteScan(${index})">
        Delete
        </button>

        `;

        historyDiv.appendChild(div);

    });

}


// DELETE

function deleteScan(index){

    scanHistory.splice(index,1);

    localStorage.setItem(

        "scanHistory",

        JSON.stringify(scanHistory)

    );

    loadHistory();

}


// EXPORT EXCEL

function exportExcel(){

    if(scanHistory.length === 0){

        alert("No history found");

        return;
    }

    const worksheet =
    XLSX.utils.json_to_sheet(scanHistory);

    const workbook =
    XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(

        workbook,

        worksheet,

        "OCR History"

    );

    XLSX.writeFile(

        workbook,

        "OCR_History.xlsx"

    );

}


// AUTO LOGIN

window.onload = ()=>{

    let savedUser =
    localStorage.getItem("ocrUser");

    if(savedUser){

        currentUser = savedUser;

        document.getElementById("loginSection")
        .style.display = "none";

        document.getElementById("appSection")
        .style.display = "block";

        loadHistory();

    }

}

</script>

</body>

</html>
