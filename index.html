<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OCR Scanner</title>

<!-- OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<!-- Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:14px;
    margin-top:20px;
}

input,textarea{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    box-sizing:border-box;
}

textarea{
    height:180px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    margin-top:10px;
    margin-right:10px;
}

button:hover{
    background:#1d4ed8;
}

video,img{
    width:100%;
    border-radius:12px;
    margin-top:15px;
}

canvas{
    display:none;
}

.history-item{
    background:#334155;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
    word-break:break-word;
}

</style>

</head>

<body>

<div class="container">

<h1>OCR Scanner</h1>

<!-- LOGIN -->

<div class="card" id="loginSection">

<h2>Email Login</h2>

<input
type="email"
id="email"
placeholder="Enter Email">

<button onclick="login()">
Login
</button>

</div>

<!-- APP -->

<div id="appSection" style="display:none;">

<div class="card">

<h2>Camera OCR</h2>

<button onclick="startCamera()">
Open Camera
</button>

<button onclick="switchCamera()">
Switch Camera
</button>

<video
id="video"
autoplay
playsinline
muted>
</video>

<button onclick="capturePhoto()">
Capture Photo
</button>

<img
id="capturedImage"
style="display:none;">

<button onclick="scanText()">
Scan Captured Photo
</button>

<p id="status"></p>

<textarea
id="resultText"
placeholder="Scanned text appears here">
</textarea>

<button onclick="saveScan()">
Save Scan
</button>

<button onclick="exportExcel()">
Export Excel
</button>

<canvas id="canvas"></canvas>

</div>

<!-- HISTORY -->

<div class="card">

<h2>Scan History</h2>

<div id="history"></div>

</div>

</div>

</div>

<script>

let currentUser = "";

let currentFacingMode = "environment";

let currentStream = null;

let scanHistory = JSON.parse(
    localStorage.getItem("scanHistory")
) || [];

const video =
document.getElementById("video");

const canvas =
document.getElementById("canvas");

const capturedImage =
document.getElementById("capturedImage");


// LOGIN

function login(){

    let email =
    document.getElementById("email").value;

    if(email.trim() === ""){

        alert("Enter Email");

        return;
    }

    currentUser = email;

    localStorage.setItem("ocrUser", email);

    document.getElementById("loginSection")
    .style.display = "none";

    document.getElementById("appSection")
    .style.display = "block";

    loadHistory();

}


// START CAMERA

async function startCamera(){

    try{

        if(currentStream){

            currentStream.getTracks().forEach(track=>{
                track.stop();
            });

        }

        currentStream =
        await navigator.mediaDevices.getUserMedia({

            video:{
                facingMode: currentFacingMode,
                width:{ ideal:1920 },
                height:{ ideal:1080 }
            },

            audio:false

        });

        video.srcObject = currentStream;

        await video.play();

        document.getElementById("status").innerText =

        currentFacingMode === "environment"

        ? "Back Camera Started"

        : "Front Camera Started";

    }catch(error){

        console.log(error);

        alert("Camera access failed");

    }

}


// SWITCH CAMERA

function switchCamera(){

    if(currentFacingMode === "environment"){

        currentFacingMode = "user";

    }else{

        currentFacingMode = "environment";

    }

    startCamera();

}


// CAPTURE PHOTO

function capturePhoto(){

    canvas.width = video.videoWidth;

    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");

    ctx.drawImage(

        video,

        0,
        0,
        canvas.width,
        canvas.height

    );

    const imageData =
    canvas.toDataURL("image/png");

    capturedImage.src = imageData;

    capturedImage.style.display = "block";

    document.getElementById("status").innerText =
    "Photo Captured";

}


// OCR SCAN

async function scanText(){

    if(capturedImage.style.display === "none"){

        alert("Capture photo first");

        return;
    }

    document.getElementById("status").innerText =
    "Scanning OCR...";

    const result =
    await Tesseract.recognize(

        capturedImage,

        'eng',

        {
            logger:m=>console.log(m)
        }

    );

    let cleanText =
    result.data.text.trim();

    document.getElementById("resultText").value =
    cleanText;

    document.getElementById("status").innerText =
    "OCR Scan Completed";

}


// SAVE HISTORY

function saveScan(){

    let text =
    document.getElementById("resultText").value;

    if(text.trim() === ""){

        alert("No text found");

        return;
    }

    let duplicate =
    scanHistory.find(

        item =>

        item.text.toLowerCase().trim()

        ===

        text.toLowerCase().trim()

    );

    if(duplicate){

        alert("Duplicate text already exists");

        return;
    }

    let data = {

        user: currentUser,

        text: text,

        date: new Date().toLocaleString()

    };

    scanHistory.unshift(data);

    localStorage.setItem(

        "scanHistory",

        JSON.stringify(scanHistory)

    );

    loadHistory();

    alert("Saved Successfully");

}


// LOAD HISTORY

function loadHistory(){

    let historyDiv =
    document.getElementById("history");

    historyDiv.innerHTML = "";

    scanHistory.forEach((item,index)=>{

        let div =
        document.createElement("div");

        div.className = "history-item";

        div.innerHTML = `

        <b>User:</b> ${item.user}<br><br>

        <b>Date:</b> ${item.date}<br><br>

        <b>Text:</b><br><br>

        ${item.text}<br><br>

        <button onclick="deleteScan(${index})">
        Delete
        </button>

        `;

        historyDiv.appendChild(div);

    });

}


// DELETE

function deleteScan(index){

    scanHistory.splice(index,1);

    localStorage.setItem(

        "scanHistory",

        JSON.stringify(scanHistory)

    );

    loadHistory();

}


// EXPORT EXCEL

function exportExcel(){

    if(scanHistory.length === 0){

        alert("No history found");

        return;
    }

    const worksheet =
    XLSX.utils.json_to_sheet(scanHistory);

    const workbook =
    XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(

        workbook,

        worksheet,

        "OCR History"

    );

    XLSX.writeFile(

        workbook,

        "OCR_History.xlsx"

    );

}


// AUTO LOGIN

window.onload = ()=>{

    let savedUser =
    localStorage.getItem("ocrUser");

    if(savedUser){

        currentUser = savedUser;

        document.getElementById("loginSection")
        .style.display = "none";

        document.getElementById("appSection")
        .style.display = "block";

        loadHistory();

    }

}

</script>

</body>

</html>
