<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OCR Scanner</title>

<!-- OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<!-- Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
    margin:0;
    padding:20px;
    background:#0f172a;
    color:white;
    font-family:Arial;
}

.container{
    max-width:950px;
    margin:auto;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:14px;
    margin-top:20px;
}

h1,h2{
    margin-top:0;
}

input,textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    box-sizing:border-box;
}

textarea{
    height:180px;
    resize:none;
}

button{
    padding:12px 20px;
    margin-top:10px;
    margin-right:10px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#1d4ed8;
}

video{
    width:100%;
    border-radius:14px;
    background:black;
    margin-top:15px;
}

.camera-box{
    position:relative;
}

.scan-area{
    position:absolute;
    border:3px solid red;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    pointer-events:none;
    box-shadow:0 0 15px red;
}

canvas{
    display:none;
}

.history-item{
    background:#334155;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
    word-break:break-word;
}

.status{
    margin-top:10px;
    color:#93c5fd;
}

</style>

</head>

<body>

<div class="container">

<h1>OCR Scanner</h1>

<!-- LOGIN -->

<div class="card" id="loginSection">

<h2>Email Login</h2>

<input
type="email"
id="email"
placeholder="Enter Email">

<button onclick="login()">
Login
</button>

</div>

<!-- APP -->

<div id="appSection" style="display:none;">

<div class="card">

<h2>Live Camera OCR</h2>

<button onclick="startCamera()">
Open Camera
</button>

<button onclick="switchCamera()">
Switch Camera
</button>

<div class="camera-box">

<video
id="video"
autoplay
playsinline
muted>
</video>

<div
class="scan-area"
id="scanArea">
</div>

</div>

<br>

<label>Scan Width</label>

<input
type="range"
id="rangeWidth"
min="150"
max="700"
value="350">

<label>Scan Height</label>

<input
type="range"
id="rangeHeight"
min="100"
max="500"
value="180">

<button onclick="scanText()">
Scan Selected Area
</button>

<p class="status" id="status"></p>

<textarea
id="resultText"
placeholder="Scanned text appears here">
</textarea>

<button onclick="saveScan()">
Save Scan
</button>

<button onclick="exportExcel()">
Export Excel
</button>

<canvas id="canvas"></canvas>

</div>

<!-- HISTORY -->

<div class="card">

<h2>Scan History</h2>

<div id="history"></div>

</div>

</div>

</div>

<script>

let currentUser = "";

let currentFacingMode = "environment";

let currentStream = null;

let scanHistory = JSON.parse(
    localStorage.getItem("scanHistory")
) || [];

const video =
document.getElementById("video");


// LOGIN

function login(){

    let email =
    document.getElementById("email").value;

    if(email.trim() === ""){

        alert("Please enter email");

        return;
    }

    currentUser = email;

    localStorage.setItem("ocrUser", email);

    document.getElementById("loginSection")
    .style.display = "none";

    document.getElementById("appSection")
    .style.display = "block";

    loadHistory();

}


// START CAMERA

async function startCamera(){

    try{

        // STOP OLD STREAM

        if(currentStream){

            currentStream.getTracks().forEach(track=>{
                track.stop();
            });

        }

        // START CAMERA

        currentStream =
        await navigator.mediaDevices.getUserMedia({

            video:{
                facingMode: currentFacingMode,
                width:{ ideal:1920 },
                height:{ ideal:1080 }
            },

            audio:false

        });

        video.srcObject = currentStream;

        await video.play();

        document.getElementById("status").innerText =

        currentFacingMode === "environment"

        ? "Back Camera Started"

        : "Front Camera Started";

    }catch(error){

        console.log(error);

        alert("Camera access failed");

    }

}


// SWITCH CAMERA

async function switchCamera(){

    if(currentFacingMode === "environment"){

        currentFacingMode = "user";

    }else{

        currentFacingMode = "environment";

    }

    startCamera();

}


// UPDATE SCAN AREA

function updateScanArea(){

    let width =
    document.getElementById("rangeWidth").value;

    let height =
    document.getElementById("rangeHeight").value;

    let area =
    document.getElementById("scanArea");

    area.style.width = width + "px";

    area.style.height = height + "px";

}


// RANGE EVENTS

document.getElementById("rangeWidth")
.addEventListener("input", updateScanArea);

document.getElementById("rangeHeight")
.addEventListener("input", updateScanArea);


// HIGH QUALITY OCR SCAN

async function scanText(){

    if(!video.srcObject){

        alert("Open camera first");

        return;
    }

    const canvas =
    document.getElementById("canvas");

    const ctx =
    canvas.getContext("2d");

    let width = parseInt(
        document.getElementById("rangeWidth").value
    );

    let height = parseInt(
        document.getElementById("rangeHeight").value
    );

    // HIGH QUALITY SIZE

    canvas.width = width * 2;

    canvas.height = height * 2;

    const sx =
    (video.videoWidth / 2) - (width / 2);

    const sy =
    (video.videoHeight / 2) - (height / 2);

    // DRAW IMAGE

    ctx.drawImage(

        video,

        sx,
        sy,
        width,
        height,

        0,
        0,
        width * 2,
        height * 2

    );

    // IMAGE PROCESSING

    let imageData =
    ctx.getImageData(
        0,
        0,
        canvas.width,
        canvas.height
    );

    let data = imageData.data;

    // BLACK & WHITE FILTER

    for(let i=0; i<data.length; i+=4){

        let avg = (

            data[i] +
            data[i+1] +
            data[i+2]

        ) / 3;

        let value = avg > 145 ? 255 : 0;

        data[i] = value;
        data[i+1] = value;
        data[i+2] = value;

    }

    ctx.putImageData(imageData,0,0);

    document.getElementById("status").innerText =
    "Scanning High Accuracy OCR...";

    // OCR

    const result =
    await Tesseract.recognize(

        canvas,

        'eng',

        {
            logger:m=>console.log(m)
        }

    );

    let cleanText =
    result.data.text.trim();

    document.getElementById("resultText").value =
    cleanText;

    document.getElementById("status").innerText =
    "Scan Completed";

}


// SAVE SCAN

function saveScan(){

    let text =
    document.getElementById("resultText").value;

    if(text.trim() === ""){

        alert("No text found");

        return;
    }

    // DUPLICATE CHECK

    let duplicate =
    scanHistory.find(

        item =>

        item.text.toLowerCase().trim()

        ===

        text.toLowerCase().trim()

    );

    if(duplicate){

        alert("Duplicate text already exists");

        return;
    }

    let data = {

        user: currentUser,

        text: text,

        date: new Date().toLocaleString()

    };

    scanHistory.unshift(data);

    localStorage.setItem(

        "scanHistory",

        JSON.stringify(scanHistory)

    );

    loadHistory();

    alert("Saved Successfully");

}


// LOAD HISTORY

function loadHistory(){

    let historyDiv =
    document.getElementById("history");

    historyDiv.innerHTML = "";

    scanHistory.forEach((item,index)=>{

        let div =
        document.createElement("div");

        div.className = "history-item";

        div.innerHTML = `

        <b>User:</b> ${item.user}<br><br>

        <b>Date:</b> ${item.date}<br><br>

        <b>Text:</b><br><br>

        ${item.text}<br><br>

        <button onclick="deleteScan(${index})">
        Delete
        </button>

        `;

        historyDiv.appendChild(div);

    });

}


// DELETE

function deleteScan(index){

    scanHistory.splice(index,1);

    localStorage.setItem(

        "scanHistory",

        JSON.stringify(scanHistory)

    );

    loadHistory();

}


// EXPORT EXCEL

function exportExcel(){

    if(scanHistory.length === 0){

        alert("No history found");

        return;
    }

    const worksheet =
    XLSX.utils.json_to_sheet(scanHistory);

    const workbook =
    XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(

        workbook,

        worksheet,

        "OCR History"

    );

    XLSX.writeFile(

        workbook,

        "OCR_History.xlsx"

    );

}


// AUTO LOGIN

window.onload = ()=>{

    updateScanArea();

    let savedUser =
    localStorage.getItem("ocrUser");

    if(savedUser){

        currentUser = savedUser;

        document.getElementById("loginSection")
        .style.display = "none";

        document.getElementById("appSection")
        .style.display = "block";

        loadHistory();

    }

}

</script>

</body>
</html>
