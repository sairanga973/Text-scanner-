<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OCR Scanner</title>

<!-- OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<!-- Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
    margin:0;
    padding:20px;
    background:#0f172a;
    font-family:Arial;
    color:white;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#1d4ed8;
}

input, textarea{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-top:10px;
}

textarea{
    height:180px;
}

video{
    width:100%;
    border-radius:12px;
    margin-top:15px;
}

canvas{
    display:none;
}

#selectionBox{
    position:absolute;
    border:3px solid red;
    pointer-events:none;
}

.camera-container{
    position:relative;
}

.history-item{
    background:#334155;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>OCR Scanner</h1>

<!-- LOGIN -->

<div class="card" id="loginSection">

<h2>Email Login</h2>

<input 
type="email" 
id="email" 
placeholder="Enter Email">

<button onclick="login()">Login</button>

</div>

<!-- APP -->

<div id="appSection" style="display:none;">

<div class="card">

<h2>Live Camera OCR</h2>

<button onclick="startCamera()">
Start Camera
</button>

<div class="camera-container">

<video id="video" autoplay playsinline></video>

<div id="selectionBox"></div>

</div>

<p>
Select scanning range using sliders
</p>

<label>Width</label>
<input type="range" id="rangeWidth" min="100" max="600" value="300">

<label>Height</label>
<input type="range" id="rangeHeight" min="100" max="400" value="150">

<button onclick="scanSelectedArea()">
Scan Selected Area
</button>

<p id="loading"></p>

<textarea 
id="resultText"
placeholder="Scanned text appears here">
</textarea>

<button onclick="saveScan()">
Save Scan
</button>

<button onclick="exportExcel()">
Export Excel
</button>

<canvas id="canvas"></canvas>

</div>

<!-- HISTORY -->

<div class="card">

<h2>History</h2>

<div id="history"></div>

</div>

</div>

</div>

<script>

let currentUser = "";

let stream;

let scanHistory = JSON.parse(
    localStorage.getItem("scanHistory")
) || [];


// LOGIN

function login(){

    let email = document.getElementById("email").value;

    if(email === ""){

        alert("Enter Email");

        return;
    }

    currentUser = email;

    localStorage.setItem("ocrUser", email);

    document.getElementById("loginSection").style.display = "none";

    document.getElementById("appSection").style.display = "block";

    loadHistory();
}


// START CAMERA

async function startCamera(){

    try{

        stream = await navigator.mediaDevices.getUserMedia({
            video:true
        });

        document.getElementById("video").srcObject = stream;

        updateSelectionBox();

    }catch(error){

        alert("Camera access denied");

    }
}


// UPDATE SELECTION BOX

function updateSelectionBox(){

    let width = document.getElementById("rangeWidth").value;

    let height = document.getElementById("rangeHeight").value;

    let box = document.getElementById("selectionBox");

    box.style.width = width + "px";

    box.style.height = height + "px";

    box.style.left = "50%";

    box.style.top = "50%";

    box.style.transform = "translate(-50%, -50%)";
}


// RANGE EVENTS

document.getElementById("rangeWidth")
.addEventListener("input", updateSelectionBox);

document.getElementById("rangeHeight")
.addEventListener("input", updateSelectionBox);


// SCAN SELECTED AREA

async function scanSelectedArea(){

    const video = document.getElementById("video");

    const canvas = document.getElementById("canvas");

    const ctx = canvas.getContext("2d");

    let width = parseInt(
        document.getElementById("rangeWidth").value
    );

    let height = parseInt(
        document.getElementById("rangeHeight").value
    );

    canvas.width = width;

    canvas.height = height;

    let startX = (video.videoWidth / 2) - (width / 2);

    let startY = (video.videoHeight / 2) - (height / 2);

    ctx.drawImage(
        video,
        startX,
        startY,
        width,
        height,
        0,
        0,
        width,
        height
    );

    document.getElementById("loading").innerText =
    "Scanning Selected Area...";

    const result = await Tesseract.recognize(
        canvas,
        'eng'
    );

    document.getElementById("resultText").value =
    result.data.text;

    document.getElementById("loading").innerText =
    "Scan Completed";
}


// SAVE HISTORY

function saveScan(){

    let text = document.getElementById("resultText").value;

    if(text.trim() === ""){

        alert("No text found");

        return;
    }

    let duplicate = scanHistory.find(
        item => item.text === text
    );

    if(duplicate){

        alert("Duplicate already exists");

        return;
    }

    let data = {

        user: currentUser,

        text: text,

        date: new Date().toLocaleString()

    };

    scanHistory.push(data);

    localStorage.setItem(
        "scanHistory",
        JSON.stringify(scanHistory)
    );

    loadHistory();

    alert("Saved");
}


// LOAD HISTORY

function loadHistory(){

    let historyDiv = document.getElementById("history");

    historyDiv.innerHTML = "";

    scanHistory.forEach((item,index)=>{

        let div = document.createElement("div");

        div.className = "history-item";

        div.innerHTML = `

        <b>User:</b> ${item.user}<br><br>

        <b>Date:</b> ${item.date}<br><br>

        <b>Text:</b><br>
        ${item.text}<br><br>

        <button onclick="deleteScan(${index})">
        Delete
        </button>

        `;

        historyDiv.appendChild(div);

    });

}


// DELETE

function deleteScan(index){

    scanHistory.splice(index,1);

    localStorage.setItem(
        "scanHistory",
        JSON.stringify(scanHistory)
    );

    loadHistory();
}


// EXPORT EXCEL

function exportExcel(){

    if(scanHistory.length === 0){

        alert("No history");

        return;
    }

    const worksheet =
    XLSX.utils.json_to_sheet(scanHistory);

    const workbook =
    XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
        workbook,
        worksheet,
        "OCR History"
    );

    XLSX.writeFile(
        workbook,
        "OCR_History.xlsx"
    );
}


// AUTO LOGIN

window.onload = ()=>{

    let savedUser =
    localStorage.getItem("ocrUser");

    if(savedUser){

        currentUser = savedUser;

        document.getElementById("loginSection")
        .style.display = "none";

        document.getElementById("appSection")
        .style.display = "block";

        loadHistory();
    }

}

</script>

</body>
</html>
